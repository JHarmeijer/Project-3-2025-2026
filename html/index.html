<!DOCTYPE html>
<html>
<head>
<title>Mini Attack Game</title>
<link rel="stylesheet" href="../Css/style.css"> 

</head>

<body>
    <div id="ui">
        Aura: <span id="playerHP">100</span><br>
        Enemy HP: <span id="enemyHP">50</span>
    </div>
    <div id="world">
        <div id="player" class="player"></div>
        <div id="enemy" class="enemy"></div>
        <div id="sword" class="sword" style="display:none;">
            <img src="../Assets/Sword-pixel.png" class="sword">
        </div>
        <div id="platforms"></div>
    </div>
<!-- Link to JS file -->
<script src="../JS/game.js"></script>
</body>

<div id="coords">X: 0, Y: 0</div>
<script>
    const coords = document.getElementById('coords');

    document.addEventListener('mousemove', function(event){
        const x = event.clientX;
        const y = event.clientY;
        coords.textContent = `X: ${x}, Y: ${y}`;
    });
</script>
</html>
