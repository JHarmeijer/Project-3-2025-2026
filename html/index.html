<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sigma Spectre - Game</title>
  <link rel="stylesheet" href="../Css/style.css">
</head>
<body>
  <div id="ui">
    Aura: <span id="playerHP">100</span>
  </div>

<div id="world">
  <div id="player" class="player"></div>
  <div>
    <img id="sword" class="sword" style="display: none;" src="../Assets/Sword-pixel.png">
  </div>
  <div id="platforms"></div>
  <div id="end"></div>
</div>

<div id="loreScreen" class="hidden">
  <div class="lore-box">
    <h1>Het verhaal van Sigma Spectre</h1>
    <p>Eeuwenlang was de wereld in vrede… tot de duisternis kwam. Jij bent de uitverkorene om het te stoppen!</p>
    <button id="startLevel1Btn">Start Level 1</button>
  </div>
</div>

<div id="pauseMenu" class="hidden">
  <div class="pause-box">
    <h1>Pause</h1>
    <button id="resumeBtn">Verder Spelen</button>
    <button id="leaveLevelBtn">Level Verlaten</button>

    <div class="slider-container">
      <label for="volumeSlider">Volume: <span id="volumeValue">50</span>%</label>
      <input type="range" min="0" max="100" value="50" id="volumeSlider">
    </div>
  </div>
</div>

<!--  WINSCREEN HIER NAAR BUITEN -->
<div id="winScreen" class="hidden">
  <div class="win-box">
    <h1 id="winText">You Win!</h1>
    <button onclick="goToMenu()">Terug naar menu</button>
    <button onclick="restartLevel()">Opnieuw spelen</button>
  </div>
</div>
  <!-- Background muziek -->
<audio id="bgMusic" src="../Assets/SoundHelix-Song-1.mp3" loop autoplay></audio>

  <script src="../JS/world.js"></script>
  <script src="../JS/game.js"></script>
  <script src="/JS/UI.js"></script>
</body>
</html>
